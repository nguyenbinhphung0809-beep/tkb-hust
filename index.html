<script>
    // 1. HÀM QUÉT MÃ LỚP RÚT GỌN (DÙNG CHO CHỨC NĂNG COPY & SO SÁNH BẠN BÈ)
    function getActiveScheduleData() {
        let bodyText = document.body.innerText;
        let matches = bodyText.match(/\b\d{6}\b/g) || [];
        return [...new Set(matches)];
    }

    // 2. HÀM BÓC TÁCH CHI TIẾT TKB (THỨ, GIỜ, PHÒNG, TÊN MÔN) DÙNG CHO GOOGLE CALENDAR
    function parseFullSchedule() {
        let lines = document.body.innerText.split('\n');
        let currentDayOffset = 0; // 0: Mon, 1: Tue, ...
        let parsedEvents = [];
        
        // Ngày bắt đầu kỳ học giả định (Thứ 2 tuần đầu kỳ - Ngày 07/09/2026)
        let baseMonday = new Date(2026, 8, 7); // Tháng 9 là index 8

        lines.forEach(line => {
            line = line.trim();
            if (line.includes("Thứ 2")) currentDayOffset = 0;
            else if (line.includes("Thứ 3")) currentDayOffset = 1;
            else if (line.includes("Thứ 4")) currentDayOffset = 2;
            else if (line.includes("Thứ 5")) currentDayOffset = 3;
            else if (line.includes("Thứ 6")) currentDayOffset = 4;
            else if (line.includes("Thứ 7")) currentDayOffset = 5;

            // Regex quét dòng TKB chuẩn: 10h15 - 11h45 • D8-502 173054 • Cơ học kỹ thuật II • LT+BT
            let match = line.match(/(\d{1,2})h(\d{2})\s*-\s*(\d{1,2})h(\d{2})\s*•\s*([^\s]+)\s+(\d{6})\s*•\s*([^•]+)/);
            if (match) {
                let startH = match[1].padStart(2, '0');
                let startM = match[2];
                let endH = match[3].padStart(2, '0');
                let endM = match[4];
                let room = match[5];
                let classId = match[6];
                let subject = match[7].trim();

                // Tính ngày học đầu tiên
                let eventDate = new Date(baseMonday);
                eventDate.setDate(baseMonday.getDate() + currentDayOffset);

                let yyyy = eventDate.getFullYear();
                let mm = String(eventDate.getMonth() + 1).padStart(2, '0');
                let dd = String(eventDate.getDate()).padStart(2, '0');

                let dtStart = `${yyyy}${mm}${dd}T${startH}${startM}00`;
                let dtEnd = `${yyyy}${mm}${dd}T${endH}${endM}00`;

                parsedEvents.push({
                    summary: `[HUST] ${subject} (${classId})`,
                    location: `Phòng ${room}`,
                    description: `Mã môn/lớp: ${classId} | Lịch học HUST Phùng Edition`,
                    dtStart: dtStart,
                    dtEnd: dtEnd
                });
            }
        });

        return parsedEvents;
    }

    // 3. XUẤT GOOGLE CALENDAR (.ICS) THẬT 100% CÓ GIỜ GIẤC & LẶP 15 TUẦN
    function exportToICS() {
        let events = parseFullSchedule();

        if (events.length === 0) {
            alert("Chưa thấy TKB nào trên màn hình cả bro! Bấm xếp TKB trước đã!");
            return;
        }

        let icsLines = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "PRODID:-//HUST TKB Phung Edition//VN",
            "CALSCALE:GREGORIAN",
            "METHOD:PUBLISH"
        ];

        events.forEach((ev, index) => {
            icsLines.push(
                "BEGIN:VEVENT",
                `UID:hust-${Date.now()}-${index}@phunged.io`,
                `SUMMARY:${ev.summary}`,
                `LOCATION:${ev.location}`,
                `DESCRIPTION:${ev.description}`,
                `DTSTART;TZID=Asia/Ho_Chi_Minh:${ev.dtStart}`,
                `DTEND;TZID=Asia/Ho_Chi_Minh:${ev.dtEnd}`,
                "RRULE:FREQ=WEEKLY;COUNT=15", // Lặp lại hàng tuần trong 15 tuần học kỳ
                "END:VEVENT"
            );
        });

        icsLines.push("END:VCALENDAR");

        const blob = new Blob([icsLines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);
        link.download = `TKB_HUST_Chuan_${Date.now()}.ics`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 4. COPY MÃ TKB DẠNG SHARE CODE BẠN BÈ
    function generateShareCode() {
        let classIds = getActiveScheduleData();
        if (classIds.length === 0) {
            alert("Chưa có TKB nào trên màn hình cả!");
            return;
        }

        let shareString = btoa(JSON.stringify(classIds));
        navigator.clipboard.writeText(shareString).then(() => {
            let status = document.getElementById('share-status');
            if (status) {
                status.innerText = `✓ Đã copy mã (${classIds.length} lớp)!`;
                setTimeout(() => status.innerText = "", 4000);
            }
        });
    }

    // 5. SO SÁNH TKB BẠN BÈ
    function compareWithFriend() {
        let friendCode = document.getElementById('friend-code').value.trim();
        let resDiv = document.getElementById('compare-result');

        if (!friendCode) {
            alert("Dán cái mã bạn mày gửi vào ô đã bro!");
            return;
        }

        try {
            let friendClassIds = JSON.parse(atob(friendCode));
            let myClassIds = getActiveScheduleData();
            let common = myClassIds.filter(id => friendClassIds.includes(id));

            if (common.length > 0) {
                resDiv.innerHTML = `<span style="color: #28a745;">🎉 Trùng khớp ${common.length} mã lớp học chung: ${common.join(', ')}</span>`;
            } else {
                resDiv.innerHTML = `<span style="color: #c8102e;">😅 Không trùng mã lớp nào rồi, lệch cạ hoàn toàn!</span>`;
            }
        } catch (e) {
            alert("Mã TKB bạn mày gửi bị lỗi hoặc không đúng định dạng!");
        }
    }
  </script>
