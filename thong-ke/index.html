<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Soạn thời khóa biểu HUST - Phiên bản Đỏ Bách Khoa</title>
  <meta name="description" content="Tool soạn thời biểu tự động HUST - Phùng Edition.">
  <link rel="icon" href="./static/favicon.ico">
  
  <!-- THEME BÁCH KHOA (HUST RED & GOLD) -->
  <style>
    :root {
      --hust-red: #c8102e;
      --hust-dark-red: #900c21;
      --hust-gold: #ffc72c;
    }
    header, .navbar, nav {
      background-color: var(--hust-red) !important;
      color: #ffffff !important;
      border-bottom: 3px solid var(--hust-gold) !important;
    }
    .btn-primary, button[type="submit"] {
      background-color: var(--hust-red) !important;
      border-color: var(--hust-dark-red) !important;
      color: #ffffff !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- BỘ CÔNG CỤ MỞ RỘNG (PHÙNG EDITION) -->
  <div id="phung-edition-box" style="max-width: 1000px; margin: 20px auto; padding: 20px; background: #ffffff; border: 2px solid #c8102e; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-family: sans-serif;">
      <h3 style="color: #c8102e; margin-top: 0; border-bottom: 2px solid #ffc72c; padding-bottom: 8px;">
          🚀 BỘ CÔNG CỤ MỞ RỘNG (PHÙNG EDITION)
      </h3>
      
      <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
          <button onclick="exportToICS()" style="background-color: #c8102e; color: white; border: none; padding: 10px 16px; font-weight: bold; border-radius: 5px; cursor: pointer;">
              📅 Xuất sang Google Calendar (.ics)
          </button>
          <button onclick="generateShareCode()" style="background-color: #0056b3; color: white; border: none; padding: 10px 16px; font-weight: bold; border-radius: 5px; cursor: pointer;">
              📋 Copy Mã TKB Của Tao
          </button>
          <span id="share-status" style="color: #28a745; font-weight: bold; align-self: center;"></span>
      </div>

      <div style="background: #fdf2f2; padding: 12px; border-radius: 6px; border-left: 4px solid #c8102e;">
          <label for="friend-code" style="font-weight: bold; color: #333;">🤝 So sánh TKB với bạn bè:</label>
          <textarea id="friend-code" rows="2" style="width: 100%; margin-top: 6px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" placeholder="Dán mã TKB của bạn mày vào đây..."></textarea>
          <button onclick="compareWithFriend()" style="background-color: #28a745; color: white; border: none; padding: 8px 14px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 8px;">
              🔍 So Sánh & Tìm Kíp Trùng
          </button>
          <div id="compare-result" style="margin-top: 10px; font-weight: bold;"></div>
      </div>
  </div>

 <script>
  // 1. HÀM TỰ ĐỘNG CÀO DỮ LIỆU TKB ĐANG HIỂN THỊ TRÊN MÀN HÌNH
  function getActiveScheduleData() {
      let scheduleList = [];
      // Lấy toàn bộ văn bản đang hiển thị trên trang web
      let pageText = document.body.innerText;
      
      // Regex quét cấu trúc: [Giờ] • [Phòng] \n [Mã lớp] • [Tên môn]
      // Ví dụ: 12h30 - 15h50 • D8-104 \n 174171 • Xác suất thống kê và QHTN
      let pattern = /(\d{1,2}h\d{2}\s*-\s*\d{1,2}h\d{2})\s*•\s*([^\n•]+)\n(\d{5,6})\s*•\s*([^\n•]+)/g;
      let match;

      while ((match = pattern.exec(pageText)) !== null) {
          scheduleList.push({
              time: match[1].trim(),
              room: match[2].trim(),
              classId: match[3].trim(),
              subjectName: match[4].trim()
          });
      }

      return scheduleList;
  }

  // 2. XUẤT GOOGLE CALENDAR (.ICS) THẬT
  function exportToICS() {
      let currentSchedule = getActiveScheduleData();

      if (currentSchedule.length === 0) {
          alert("Tao chưa thấy phương án TKB nào trên màn hình cả! Mày bấm xếp TKB ra kết quả đã nhé!");
          return;
      }

      let icsLines = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//HUST TKB Phung Edition//VN",
          "CALSCALE:GREGORIAN",
          "METHOD:PUBLISH"
      ];

      currentSchedule.forEach((item, index) => {
          let summary = `[HUST] ${item.subjectName} (Lớp ${item.classId})`;
          let location = `Phòng ${item.room}`;
          let description = `Mã lớp: ${item.classId} | Giờ học: ${item.time}`;

          icsLines.push(
              "BEGIN:VEVENT",
              `UID:hust-${item.classId}-${index}@phunged.io`,
              `SUMMARY:${summary}`,
              `LOCATION:${location}`,
              `DESCRIPTION:${description}`,
              "END:VEVENT"
          );
      });

      icsLines.push("END:VCALENDAR");

      const blob = new Blob([icsLines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
      const link = document.createElement("a");
      link.href = window.URL.createObjectURL(blob);
      link.download = `TKB_HUST_${Date.now()}.ics`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
  }

  // 3. COPY MÃ TKB THẬT ĐỂ GỬI BẠN BÈ
  function generateShareCode() {
      let currentSchedule = getActiveScheduleData();

      if (currentSchedule.length === 0) {
          alert("Chọn xong TKB đi đã rồi mới có mã gửi cho bạn mày chứ!");
          return;
      }

      // Mã hóa danh sách mã lớp đang chọn thành chuỗi mã hóa
      let classIds = currentSchedule.map(c => `${c.classId}:${c.subjectName}`);
      let shareString = btoa(encodeURIComponent(JSON.stringify(classIds)));

      navigator.clipboard.writeText(shareString).then(() => {
          document.getElementById('share-status').innerText = `✓ Đã copy mã (${currentSchedule.length} môn)!`;
          setTimeout(() => document.getElementById('share-status').innerText = "", 3000);
      });
  }

  // 4. SO SÁNH VỚI MÃ CỦA BẠN BÈ
  function compareWithFriend() {
      let friendCode = document.getElementById('friend-code').value.trim();
      let resDiv = document.getElementById('compare-result');

      if (!friendCode) {
          alert("Dán cái mã bạn mày gửi vào ô đã bro!");
          return;
      }

      try {
          let decodedData = JSON.parse(decodeURIComponent(atob(friendCode)));
          let mySchedule = getActiveScheduleData();
          let myClassIds = mySchedule.map(c => c.classId);

          let common = [];
          decodedData.forEach(item => {
              let [id, name] = item.split(':');
              if (myClassIds.includes(id)) {
                  common.push(`${name} (${id})`);
              }
          });

          if (common.length > 0) {
              resDiv.innerHTML = `<span style="color: #28a745;">🎉 Trùng khớp ${common.length} lớp học chung: ${common.join(', ')}</span>`;
          } else {
              resDiv.innerHTML = `<span style="color: #c8102e;">😅 Không trùng mã lớp nào rồi, lệch cạ hoàn toàn!</span>`;
          }
      } catch (e) {
          alert("Mã TKB bạn mày gửi bị lỗi hoặc không đúng định dạng!");
      }
  }
</script>

  <script src="u48.js"></script>
  <script src="h3c6.js"></script>
  <script src="i3c4.js"></script>
</body>
</html>
