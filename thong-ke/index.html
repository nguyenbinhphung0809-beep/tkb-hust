<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thống kê lớp mở các kỳ HUST</title><meta name="description" content="Thống kê lớp mở các kỳ HUST. Giúp bạn có được cái nhìn tổng quan về xu hướng mở lớp của Đại học Bách khoa Hà Nội qua các kỳ."><link rel="icon" href="../static/my-favicon.ico"><meta property="og:title" content="Thống kê lớp mở các kỳ HUST"><meta property="og:description" content="Thống kê lớp mở các kỳ HUST. Giúp bạn có được cái nhìn tổng quan về xu hướng mở lớp của Đại học Bách khoa Hà Nội qua các kỳ."><meta property="og:image" content="../static/my-favicon.png"><script src="../n55.js"></script><style>
  /* ==========================================
     THEME BÁCH KHOA (HUST RED & GOLD)
     ========================================== */
  :root {
    --hust-red: #c8102e;       /* Đỏ chuẩn logo Bách Khoa */
    --hust-dark-red: #900c21;  /* Đỏ đô sẫm */
    --hust-gold: #ffc72c;      /* Vàng kim huy hiệu */
    --hust-bg: #f8f9fa;
  }

  /* Header & Thanh tiêu đề */
  header, .navbar, nav, .header-bg {
    background-color: var(--hust-red) !important;
    color: #ffffff !important;
    border-bottom: 3px solid var(--hust-gold) !important;
  }

  /* Nút bấm chính (Tải file, Xếp TKB, v.v.) */
  .btn-primary, button[type="submit"], #calculate, .btn {
    background-color: var(--hust-red) !important;
    border-color: var(--hust-dark-red) !important;
    color: #ffffff !important;
    font-weight: bold !important;
    transition: all 0.2s ease-in-out !important;
  }

  .btn-primary:hover, button:hover {
    background-color: var(--hust-dark-red) !important;
    border-color: var(--hust-gold) !important;
    box-shadow: 0 4px 8px rgba(200, 16, 46, 0.4) !important;
  }

  /* Bảng thời khóa biểu & Tiêu đề cột */
  table th, .table-header {
    background-color: var(--hust-red) !important;
    color: #ffffff !important;
  }

  /* Khung thẻ môn học được chọn */
  .card, .subject-item, .event-item {
    border-left: 5px solid var(--hust-red) !important;
    background-color: #fff0f2 !important;
  }

  /* Highlight ô được chọn */
  .active, .highlight, .badge-success {
    background-color: var(--hust-gold) !important;
    color: #000000 !important;
    font-weight: bold !important;
  }
</style></head><body><script src="../u48.js"></script><script src="../thong-ke/i3c4.js"></script></body></html>
